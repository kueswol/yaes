<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>YAES</title>
    <style>
        html,body {
            font-family: monospace;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #world {
            display: block;
        }
        #overlay {
            position:absolute;
            top:10px;
            left:10px;
            color:white;
            background:rgba(0,0,0,0.6);
            padding:8px;
            font-family:monospace;
            font-size:14px;
            border-radius:6px;
        }
        #creature-details {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 250px;
            max-height: 80vh;
            overflow-y: auto;
            color: white;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
        }
        #control-panel {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 300px; /* Same width as overlay */
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
        }
        .control-slider-container {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .control-slider-label {
            min-width: 80px;
            font-size: 12px;
        }
        .control-slider {
            flex: 1;
            height: 6px;
            background: rgba(100, 100, 100, 0.8);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        .control-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            background: rgba(0, 150, 255, 0.9);
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid rgba(0, 200, 255, 1);
        }
        .control-slider::-webkit-slider-thumb:hover {
            background: rgba(0, 180, 255, 1);
        }
        .control-slider-value {
            min-width: 40px;
            text-align: right;
            font-weight: bold;
            font-size: 12px;
        }
        .control-button {
            padding: 8px 16px;
            margin: 4px 4px 4px 0;
            background: rgba(100, 100, 100, 0.8);
            color: white;
            border: 2px solid rgba(150, 150, 150, 0.8);
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .control-button:hover {
            background: rgba(120, 120, 120, 0.9);
            border-color: rgba(200, 200, 200, 0.9);
        }
        .control-button.active {
            background: rgba(0, 150, 0, 0.8);
            border-color: rgba(0, 255, 0, 1);
            font-weight: bold;
        }
        .stat_cell_left {
            text-align: left;
            padding-right: 10px;
            width: 150px;
        }
        .stat_cell_right {
            text-align: right;
            font-weight: bold;
            width: 150px;
        }
    </style>
</head>
<body>
    <canvas id="world"></canvas>
    <div id="overlay">
        <table style="border: 0;">
            <tr><td class="stat_cell_left">Zoom:</td>               <td class="stat_cell_right"><span id="zoom_value">                    -</span></td></tr>
            <tr><td class="stat_cell_left">Camera:</td>             <td class="stat_cell_right"><span id="camera_value">                  -</span></td></tr>
            <tr><td class="stat_cell_left">tick:</td>               <td class="stat_cell_right"><span id="stat_tick">                     -</span></td></tr>
            <tr><td colspan="2"><hr style="border-color: #555;"></td></tr>
            <tr><td class="stat_cell_left">population:</td>         <td class="stat_cell_right"><span id="stat_population">               -</span></td></tr>
            <tr><td class="stat_cell_left">births:</td>             <td class="stat_cell_right"><span id="stat_births">                   -</span></td></tr>
            <tr><td class="stat_cell_left">deaths:</td>             <td class="stat_cell_right"><span id="stat_deaths">                   -</span></td></tr>
            <tr><td colspan="2"><hr style="border-color: #555;"></td></tr>
            <tr><td class="stat_cell_left">avg_energy:</td>         <td class="stat_cell_right"><span id="stat_avg_energy">               -</span></td></tr>
            <tr><td class="stat_cell_left">avg_age:</td>            <td class="stat_cell_right"><span id="stat_avg_age">                  -</span></td></tr>
            <tr><td colspan="2"><hr style="border-color: #555;"></td></tr>
            <tr><td class="stat_cell_left">food available:</td>     <td class="stat_cell_right"><span id="stat_total_food">               -</span></td></tr>
            <tr><td class="stat_cell_left">eat_success:</td>        <td class="stat_cell_right"><span id="stat_eat_success">              -</span></td></tr>
            <tr><td class="stat_cell_left">eat_failed:</td>         <td class="stat_cell_right"><span id="stat_eat_failed">               -</span></td></tr>
            <tr><td colspan="2"><hr style="border-color: #555;"></td></tr>
            <tr><td class="stat_cell_left">repro_success:</td>      <td class="stat_cell_right"><span id="stat_reproduce_success">        -</span></td></tr>
            <tr><td class="stat_cell_left">repro_err_age:</td>      <td class="stat_cell_right"><span id="stat_reproduce_failed_age">     -</span></td></tr>
            <tr><td class="stat_cell_left">repro_err_energy:</td>   <td class="stat_cell_right"><span id="stat_reproduce_failed_energy">  -</span></td></tr>
            <tr><td class="stat_cell_left">repro_err_cooldown:</td> <td class="stat_cell_right"><span id="stat_reproduce_failed_cooldown">-</span></td></tr>
        </table>
    </div>
    <div id="creature-details" style="display: none;">
        <table style="border: 0;">
            <tr><td>ID:</td>    <td><span id="detail_id">    </span></td></tr>
            <tr><td>Energy:</td><td><span id="detail_energy"></span></td></tr>
        </table>
    </div>
    <div id="control-panel">
        <div style="display: flex; gap: 8px; margin-bottom: 12px;">
            <button id="btn-pause" class="control-button" style="flex: 1;">Pause</button>
            <button id="btn-resume" class="control-button active" style="flex: 1;">Resume</button>
        </div>
        <div class="control-slider-container">
            <span class="control-slider-label">Target TPS:</span>
            <input type="range" id="tps-slider" class="control-slider" min="1" max="100" step="1" value="25">
            <span id="tps-value" class="control-slider-value">25</span>
        </div>
    </div>
    <script>
        ///////////////////////////////////////////////////////////////////////////////////////
        // VARS
        ///////////////////////////////////////////////////////////////////////////////////////
        // canvas
        const canvas = document.getElementById("world");
        const size = Math.min(window.innerWidth, window.innerHeight) * 0.9;
        const gl = canvas.getContext("webgl");
        // world
        const SCALE = 1;
        const worldWidth = 200 * SCALE;
        const worldHeight = 200 * SCALE;

        const MIN_ZOOM = 0.99;
        const MAX_ZOOM = 200;
        let cameraX = 50;
        let cameraY = 50;
        let zoom = 0.99;
        
        const emptyData = new Uint8Array((worldWidth / SCALE) * (worldHeight / SCALE) * 4);
        
        let creatures = [];
        
        ///////////////////////////////////////////////////////////////////////////////////////
        // FUNCTIONS
        ///////////////////////////////////////////////////////////////////////////////////////
        function createShader(gl, type, source) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, source);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error("Shader compile error:");
                console.error(gl.getShaderInfoLog(shader));
                console.error(source);
                gl.deleteShader(shader);
                return null;
            }
            return shader;
        }
        function createProgram(gl, vertexSrc, fragmentSrc) {
            const vs = createShader(gl, gl.VERTEX_SHADER, vertexSrc);
            const fs = createShader(gl, gl.FRAGMENT_SHADER, fragmentSrc);

            const program = gl.createProgram();
            gl.attachShader(program, vs);
            gl.attachShader(program, fs);
            gl.linkProgram(program);

            return program;
        }
        function setCamera(gl, program) {
            gl.uniform2f(gl.getUniformLocation(program, "camera"), cameraX, cameraY);
            gl.uniform1f(gl.getUniformLocation(program, "zoom"), zoom);
            gl.uniform2f(gl.getUniformLocation(program, "worldSize"), worldWidth, worldHeight);
        }
        function render() {
            // gl.clearColor(0.5, 0.5, 0.5, 1.0);
            gl.clearColor(0.16, 0.23, 0.23, 1.0);
            gl.clear(gl.COLOR_BUFFER_BIT);

            foodLayer.draw();
            gridLayer.draw();
            creatureLayer.draw();

            updateOverlay();
        }
        function resizeCanvas() {
            const size = Math.min(canvas.width, canvas.height) * 0.9;
            const offsetX = (canvas.width - size) / 2;
            const offsetY = (canvas.height - size) / 2;
            gl.viewport(offsetX, offsetY, size, size);
            // zoom = size / worldWidth;
            clampCamera();
        }
        function updateOverlay() {
            document.getElementById("zoom_value")
                .textContent = Number(zoom.toFixed(2)).toLocaleString();
            document.getElementById("camera_value")
                .textContent = Number(cameraX.toFixed(0)).toLocaleString() + "/" + Number(cameraY.toFixed(0)).toLocaleString();
        }
        function createGrid(worldWidth, worldHeight, cellSize) {
            const lines = [];
            for (let x = 0; x <= worldWidth; x += cellSize) {
                lines.push(x,0);
                lines.push(x,worldHeight);
            }
            for (let y = 0; y <= worldHeight; y += cellSize) {
                lines.push(0,y);
                lines.push(worldWidth,y);
            }
            return new Float32Array(lines);
        }
        function createWorldBorder(worldWidth, worldHeight) {
            return new Float32Array([
                0,0,
                worldWidth,0,

                worldWidth,0,
                worldWidth,worldHeight,

                worldWidth,worldHeight,
                0,worldHeight,

                0,worldHeight,
                0,0
            ]);
        }
        function createWorldQuad(w, h) {
            return new Float32Array([
                0, 0,
                w, 0,
                0, h,

                0, h,
                w, 0,
                w, h
            ]);
        }
        function getViewSize() {
            const viewWidth = worldWidth / zoom;
            const viewHeight = worldHeight / zoom;
            return { viewWidth, viewHeight };
        }
        function clampCamera() {
            const { viewWidth, viewHeight } = getViewSize();

            const halfW = viewWidth / 2;
            const halfH = viewHeight / 2;

            cameraX = Math.max(halfW, Math.min(worldWidth - halfW, cameraX));
            cameraY = Math.max(halfH, Math.min(worldHeight - halfH, cameraY));
        }
        function checkCreatureClick(worldX, worldY) {
            const clickRadius = 10; // radius in world units for clicking creatures
            for (const creature of creatures) {
                const dx = creature.x - worldX;
                const dy = creature.y - worldY;
                if (dx * dx + dy * dy < clickRadius * clickRadius) {
                    console.log("Clicked creature ID:", creature.id);
                    loadCreatureDetails(creature.id);
                    return;
                }
            }
            // hide overlay if no creature was clicked
            document.getElementById("creature-details").style.display = "none";
        }
        async function loadCreatureDetails(id) {
            try {
                const response = await fetch(`/creature/${id}`);
                const data = await response.json();
                // Fülle das Overlay
                document.getElementById("detail_id").textContent = data.id;
                document.getElementById("detail_energy").textContent = data.energy;
                // Overlay anzeigen
                document.getElementById("creature-details").style.display = "block";
            } catch (error) {
                console.error("Fehler beim Laden der Kreatur-Details:", error);
            }
        }
        ///////////////////////////////////////////////////////////////////////////////////////
        // STUFF
        ///////////////////////////////////////////////////////////////////////////////////////
        // canvas        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        window.onresize = resizeCanvas;
        resizeCanvas();
        if (!gl) { alert("WebGL not supported"); }

        const foodTexture = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, foodTexture);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, worldWidth / SCALE, worldHeight / SCALE, 0, gl.RGBA, gl.UNSIGNED_BYTE, emptyData);

        // shader sources
        const creatureVertexShaderSource = `
        attribute vec2 position;       // creature center position
        attribute vec2 triangleVertex; // triangle corner offset (-1..1)
        attribute vec3 vertexColor;    // RGB color
        attribute float size;          // creature size (0..1)
        attribute float orientation;   // rotation in radians [0, 2π)
        
        uniform vec2 worldSize;
        uniform vec2 camera;
        uniform float zoom;
        
        varying vec3 v_color;
        
        void main() {
            // Scale triangle vertex by size (e.g., 0.2 → 0.2 units radius)
            vec2 scaledOffset = triangleVertex * size;
            
            // Rotate based on creature orientation
            float orientation_corrected_for_gl = orientation - 1.57079632679; // -π/2 to align with grid in simulation
            float cos_o = cos(orientation_corrected_for_gl);
            float sin_o = sin(orientation_corrected_for_gl);
            vec2 rotated = vec2(
                scaledOffset.x * cos_o - scaledOffset.y * sin_o,
                scaledOffset.x * sin_o + scaledOffset.y * cos_o
            );
            
            // Final world position
            vec2 worldPos = position + rotated;
            vec2 world = (worldPos - camera) * zoom;
            vec2 clip = vec2(
                world.x / worldSize.x * 2.0,
                world.y / worldSize.y * 2.0
            );
            
            gl_Position = vec4(clip.x, -clip.y, 0.0, 1.0);
            v_color = vertexColor;
        }
        `;
        
        const creatureFragmentShaderSource = `
        precision mediump float;
        varying vec3 v_color;
        
        void main() {
            gl_FragColor = vec4(v_color,1.0);
        }
        `;
        
        const gridVertexShaderSource = `
        attribute vec2 position;
        uniform vec2 worldSize;
        uniform vec2 camera;
        uniform float zoom;
        void main() {
            vec2 world = (position - camera) * zoom;
            vec2 clip = vec2(
                world.x / worldSize.x * 2.0,
                world.y / worldSize.y * 2.0
            );
            gl_Position = vec4(clip.x, -clip.y, 0.0, 1.0);
        }
        `;
        
        const gridFragmentShaderSource = `
        precision mediump float;
        uniform vec4 color;
        void main() {
            gl_FragColor = color;
        }
        `;

        const foodmapVertexShaderSource = `
        attribute vec2 position;
        uniform vec2 worldSize;
        uniform vec2 camera;
        uniform float zoom;
        varying vec2 v_uv;
        void main() {
            vec2 world = (position - camera) * zoom;
            vec2 clip = vec2(
                world.x / worldSize.x * 2.0,
                world.y / worldSize.y * 2.0
            );
            gl_Position = vec4(clip.x, -clip.y, 0.0, 1.0);
            v_uv = position / worldSize;
        }
        `;

        const foodmapFragmentShaderSource = `
        precision mediump float;
        uniform sampler2D foodmap;
        varying vec2 v_uv;
        void main() {
            float value = texture2D(foodmap, v_uv).r;
            vec3 color = mix(
                vec3(0.3, 0.3, 0.3),   // leer
                vec3(0.0, 0.4, 0.0),   // Nahrung
                value
            );
            gl_FragColor = vec4(color, 1.0);
        }
        `;

        // compile shaders
        const creatureVertexShader = createShader(gl, gl.VERTEX_SHADER, creatureVertexShaderSource);
        if (!creatureVertexShader) { console.error('Creature Vertex Shader failed'); }
        const creatureFragmentShader = createShader(gl, gl.FRAGMENT_SHADER, creatureFragmentShaderSource);
        if (!creatureFragmentShader) { console.error('Creature Fragment Shader failed'); }
        const gridVertexShader = createShader(gl, gl.VERTEX_SHADER, gridVertexShaderSource);
        const gridFragmentShader = createShader(gl, gl.FRAGMENT_SHADER, gridFragmentShaderSource);
        const foodmapVertexShader = createShader(gl, gl.VERTEX_SHADER, foodmapVertexShaderSource);
        const foodmapFragmentShader = createShader(gl, gl.FRAGMENT_SHADER, foodmapFragmentShaderSource);

        // WebGL programs
        const creatureProgram = gl.createProgram();
        gl.attachShader(creatureProgram, creatureVertexShader);
        gl.attachShader(creatureProgram, creatureFragmentShader);
        gl.linkProgram(creatureProgram);
        gl.useProgram(creatureProgram);
        
        const gridProgram = gl.createProgram();
        gl.attachShader(gridProgram, gridVertexShader);
        gl.attachShader(gridProgram, gridFragmentShader);
        gl.linkProgram(gridProgram);
        const gridColorLocation = gl.getUniformLocation(gridProgram, "color");
        
        const foodmapProgram = gl.createProgram();
        gl.attachShader(foodmapProgram, foodmapVertexShader);
        gl.attachShader(foodmapProgram, foodmapFragmentShader);
        gl.linkProgram(foodmapProgram);
        const foodPositionLocation = gl.getAttribLocation(foodmapProgram, "position");
        const foodCameraLocation = gl.getUniformLocation(foodmapProgram, "camera");
        const foodZoomLocation = gl.getUniformLocation(foodmapProgram, "zoom");
        const foodWorldSizeLocation = gl.getUniformLocation(foodmapProgram, "worldSize");
        const foodSamplerLocation = gl.getUniformLocation(foodmapProgram, "foodmap");

        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);

        // buffer for batch rendering
        const positionBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);

        // Triangle vertices (asymmetric arrow pointing up)
        // Vertex 1: tip (front)
        // Vertex 2: bottom-left (rear-left)
        // Vertex 3: bottom-right (rear-right)
        const triangleVertices = new Float32Array([
            0.0,  1.0,   // Spitze vorne
            -0.5, -1.0,  // hinten links
            0.5, -1.0    // hinten rechts
        ]);
        const triangleBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, triangleBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, triangleVertices, gl.STATIC_DRAW);

        const gridData = createGrid(worldWidth, worldHeight, worldWidth/10);
        const gridBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, gridBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, gridData, gl.STATIC_DRAW);
        const gridVertexCount = gridData.length / 2;

        const borderData = createWorldBorder(worldWidth, worldHeight);
        const borderBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, borderBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, borderData, gl.STATIC_DRAW);
        const borderVertexCount = borderData.length / 2;

        const foodData = createWorldQuad(worldWidth, worldHeight);
        const foodBuffer = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, foodBuffer);
        gl.bufferData(gl.ARRAY_BUFFER, foodData, gl.STATIC_DRAW);

        // connect attributes
        const positionLocation = gl.getAttribLocation(creatureProgram, "position");
        const gridPositionLocation = gl.getAttribLocation(gridProgram, "position");
        gl.enableVertexAttribArray(positionLocation);
        gl.vertexAttribPointer(positionLocation,2,gl.FLOAT,false,0,0);


        // camera zooming/panning
        cameraX = worldWidth / 2;
        cameraY = worldHeight / 2;
        // zoom = Math.min(canvas.width, canvas.height) / worldWidth;
        zoom = 0.99;
        const cameraLocation = gl.getUniformLocation(creatureProgram, "camera");
        const zoomLocation = gl.getUniformLocation(creatureProgram, "zoom");
        const worldSizeLocation = gl.getUniformLocation(creatureProgram, "worldSize");
        gl.uniform2f(cameraLocation, cameraX, cameraY);
        gl.uniform1f(zoomLocation, zoom);
        gl.uniform2f(worldSizeLocation, worldWidth, worldHeight);

        // mouse panning
        let dragging = false;
        let mouseDown = false;
        canvas.onmousedown = (e) => {
            mouseDown = true;
            dragging = false; // Reset
        };
        canvas.onmouseup = (e) => {
            if (!dragging && mouseDown) {
                // Handle click (nur wenn nicht gedraggt)
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;

                const size = Math.min(canvas.width, canvas.height) * 0.9;
                const offsetX = (canvas.width - size) / 2;
                const offsetY = (canvas.height - size) / 2;
                const viewportX = mouseX - offsetX;
                const viewportY = mouseY - offsetY;                
                if (viewportX >= 0 && viewportX <= size && viewportY >= 0 && viewportY <= size) {
                    const worldX = cameraX + (viewportX / size - 0.5) * worldWidth / zoom;
                    const worldY = cameraY - (viewportY / size - 0.5) * worldHeight / zoom;
                    console.log("Clicked at world:", worldX, worldY);
                    checkCreatureClick(worldX, worldY);
                }
            }
            mouseDown = false;
            dragging = false;
        };
        canvas.onmousemove = (e) => {
            if (mouseDown) {
                dragging = true; // Bewegung erkannt
                const worldPerPixelX = worldWidth / canvas.width;
                const worldPerPixelY = worldHeight / canvas.height;
                cameraX -= e.movementX * worldPerPixelX / zoom;
                cameraY -= e.movementY * worldPerPixelY / zoom;
                clampCamera();
            }
        };

        // mouse zooming
        canvas.onwheel = (e) => {
            e.preventDefault();
            const zoomFactor = 1.1;
            const mouseWorldX = cameraX + (e.offsetX / canvas.width - 0.5) * worldWidth / zoom;
            const mouseWorldY = cameraY - (e.offsetY / canvas.height - 0.5) * worldHeight / zoom;
            // if (e.deltaY < 0) 
            //     zoom *= Math.pow(zoomFactor, -e.deltaY * 0.01);
            // else
            //     zoom /= Math.pow(zoomFactor, -e.deltaY * 0.01);
            if (e.deltaY < 0)
                zoom *= zoomFactor;
            else
                zoom /= zoomFactor;

            // clamp
            zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoom));
            cameraX = mouseWorldX - (e.offsetX / canvas.width - 0.5) * worldWidth / zoom;
            cameraY = mouseWorldY + (e.offsetY / canvas.height - 0.5) * worldHeight / zoom;
            clampCamera();
        };

        // creature selection
        // canvas.onclick = (e) => {
        //     const rect = canvas.getBoundingClientRect();
        //     const mouseX = e.clientX - rect.left;
        //     const mouseY = e.clientY - rect.top;
        //     const worldX = cameraX + (mouseX / canvas.width - 0.5) * worldWidth / zoom;
        //     const worldY = cameraY - (mouseY / canvas.height - 0.5) * worldHeight / zoom;
        //     console.log("Clicked at world:", worldX, worldY);
        //     checkCreatureClick(worldX, worldY);
        // };
        ///////////////////////////////////////////////////////////////////////////////////////
        // Websocket
        ///////////////////////////////////////////////////////////////////////////////////////

        const socket = new WebSocket("ws://" + location.host + "/ws");
        socket.binaryType = "arraybuffer";
        socket.onmessage = (event) => {
            const bytes = new Uint8Array(event.data);
            const type = bytes[0];
            const payload = bytes.slice(1);
            
            if (type === 1) {
                // CREATURES
                creatures = [];
                // const positions = [];
                const view = new DataView(payload.buffer, payload.byteOffset);
                const chunkSize = 23 // 23 Bytes pro Kreatur: u32 (id) + f32 (x) + f32 (y) + f32 (size) + [u8; 3] (color) + f32 (orientation)
                for (let i = 0; i < payload.length; i += chunkSize) { 
                    const id = view.getUint32(i, true); // Little-endian
                    const x = view.getFloat32(i + 4, true) * SCALE;
                    const y = view.getFloat32(i + 8, true) * SCALE;
                    // const size = Math.max(view.getFloat32(i + 12, true), 0.2) * SCALE;
                    const size = view.getFloat32(i + 12, true) * SCALE;
                    const r = payload[i + 16] / 255.0;
                    const g = payload[i + 17] / 255.0;
                    const b = payload[i + 18] / 255.0;
                    const orientation = view.getFloat32(i + 19, true);
                    creatures.push({ id, x, y, size, color: [r, g, b], orientation });
                    // positions.push(x, y); // Für WebGL
                }

                // gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
                // gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(positions), gl.DYNAMIC_DRAW);
                creatureLayer.count = creatures.length;
            }
            else if (type === 2) {
                console.log("Received foodmap update");
                // FOODMAP
                gl.bindTexture(gl.TEXTURE_2D, foodTexture);
                const rgbaData = new Uint8Array(payload.length * 4);
                for (let i = 0; i < payload.length; i++) {
                    const val = payload[i];    // 0-255 for food amount
                    rgbaData[i * 4] = val;     // R
                    rgbaData[i * 4 + 1] = 0;   // G
                    rgbaData[i * 4 + 2] = 0;   // B
                    rgbaData[i * 4 + 3] = val; // A
                }
                gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,worldWidth / SCALE,worldHeight / SCALE,0,gl.RGBA,gl.UNSIGNED_BYTE,rgbaData);
            }
            render();
        };

        ///////////////////////////////////////////////////////////////////////////////////////
        // WebGL Layers
        ///////////////////////////////////////////////////////////////////////////////////////
        const foodLayer = {
            program: createProgram(gl, foodmapVertexShaderSource, foodmapFragmentShaderSource),
            buffer: foodBuffer,
            texture: foodTexture,
            
            draw() {
                gl.useProgram(this.program);
                setCamera(gl, this.program);

                const posLoc = gl.getAttribLocation(this.program, "position");
                const samplerLoc = gl.getUniformLocation(this.program, "foodmap");

                gl.bindBuffer(gl.ARRAY_BUFFER, this.buffer);
                gl.enableVertexAttribArray(posLoc);
                gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

                gl.activeTexture(gl.TEXTURE0);
                gl.bindTexture(gl.TEXTURE_2D, this.texture);
                gl.uniform1i(samplerLoc, 0);
                
                gl.drawArrays(gl.TRIANGLES, 0, 6);
            }
        };
        const gridLayer = {
            program: createProgram(gl, gridVertexShaderSource, gridFragmentShaderSource),
            buffer: gridBuffer,
            count: gridVertexCount,

            draw() {
                gl.useProgram(this.program);
                setCamera(gl, this.program);

                const posLoc = gl.getAttribLocation(this.program, "position");
                const colorLoc = gl.getUniformLocation(this.program, "color");

                gl.bindBuffer(gl.ARRAY_BUFFER, this.buffer);
                gl.enableVertexAttribArray(posLoc);
                gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

                gl.uniform4f(colorLoc, 0.25, 0.25, 0.25, 1);
                gl.drawArrays(gl.LINES, 0, this.count);
            }
        };
        const creatureAttrLocs = {
            position: null,
            triangleVertex: null,
            vertexColor: null,
            size: null,
            orientation: null
        };
        const creatureLayer = {
            program: creatureProgram,
            count: 0,

            draw() {
                gl.useProgram(this.program);
                setCamera(gl, this.program);

                // Cache locations on first draw
                if (creatureAttrLocs.position === null) {
                    creatureAttrLocs.position = gl.getAttribLocation(this.program, "position");
                    creatureAttrLocs.triangleVertex = gl.getAttribLocation(this.program, "triangleVertex");
                    creatureAttrLocs.vertexColor = gl.getAttribLocation(this.program, "vertexColor");
                    creatureAttrLocs.size = gl.getAttribLocation(this.program, "size");
                    creatureAttrLocs.orientation = gl.getAttribLocation(this.program, "orientation");
                }
                // Disable all vertex attrib arrays except triangleVertex
                gl.disableVertexAttribArray(creatureAttrLocs.position);
                gl.disableVertexAttribArray(creatureAttrLocs.vertexColor);
                gl.disableVertexAttribArray(creatureAttrLocs.size);
                gl.disableVertexAttribArray(creatureAttrLocs.orientation);
                
                // Enable ONLY the triangleVertex array (the buffer-based one)
                gl.bindBuffer(gl.ARRAY_BUFFER, triangleBuffer);
                gl.enableVertexAttribArray(creatureAttrLocs.triangleVertex);
                gl.vertexAttribPointer(creatureAttrLocs.triangleVertex, 2, gl.FLOAT, false, 0, 0);

                for (let c = 0; c < creatures.length; c++) {
                    const creature = creatures[c];
                    
                    // Position attribute
                    gl.vertexAttrib2f(creatureAttrLocs.position, creature.x, creature.y);
                    
                    // Color attribute
                    gl.vertexAttrib3f(creatureAttrLocs.vertexColor, creature.color[0], creature.color[1], creature.color[2]);
                    
                    // Size attribute
                    gl.vertexAttrib1f(creatureAttrLocs.size, creature.size);
                    
                    // Orientation attribute
                    gl.vertexAttrib1f(creatureAttrLocs.orientation, creature.orientation);
                    
                    // Draw 3 vertices per creature (one triangle)
                    gl.drawArrays(gl.TRIANGLES, 0, 3);
                        
                    //     // Triangle vertices buffer
                    //     gl.bindBuffer(gl.ARRAY_BUFFER, triangleBuffer);
                    //     const triangleLoc = gl.getAttribLocation(this.program, "triangleVertex");
                    //     gl.enableVertexAttribArray(triangleLoc);
                    //     gl.vertexAttribPointer(triangleLoc, 2, gl.FLOAT, false, 0, 0);
                    
                }
            }
        };

        ///////////////////////////////////////////////////////////////////////////////////////
        // Stats per classic webservice
        ///////////////////////////////////////////////////////////////////////////////////////
        async function updateWorldStats() {
            const response = await fetch("/world");
            const data = await response.json();
            document.getElementById("stat_tick").textContent = data.tick.toLocaleString();
            document.getElementById("stat_population").textContent = data.population.toLocaleString();
            document.getElementById("stat_avg_energy").textContent = Number(data.avg_energy.toFixed(2)).toLocaleString();
            document.getElementById("stat_avg_age").textContent = Number(data.avg_age.toFixed(2)).toLocaleString();
            document.getElementById("stat_total_food").textContent = data.total_food.toLocaleString();
            document.getElementById("stat_births").textContent = data.births.toLocaleString();
            document.getElementById("stat_deaths").textContent = data.deaths.toLocaleString();
            document.getElementById("stat_eat_success").textContent = data.eat_success.toLocaleString();
            document.getElementById("stat_eat_failed").textContent = data.eat_failed.toLocaleString();
            document.getElementById("stat_reproduce_success").textContent = data.reproduce_success.toLocaleString();
            document.getElementById("stat_reproduce_failed_age").textContent = data.reproduce_failed_age.toLocaleString();
            document.getElementById("stat_reproduce_failed_energy").textContent = data.reproduce_failed_energy.toLocaleString();
            document.getElementById("stat_reproduce_failed_cooldown").textContent = data.reproduce_failed_cooldown.toLocaleString();
        }
        interval_updateWorld   = setInterval(updateWorldStats, 2000);

        ///////////////////////////////////////////////////////////////////////////////////////
        // Control Panel
        ///////////////////////////////////////////////////////////////////////////////////////
        let simulationPaused = true;
        let targetTPS = 25;

        const btnPause = document.getElementById("btn-pause");
        const btnResume = document.getElementById("btn-resume");
        const tpsSlider = document.getElementById("tps-slider");
        const tpsValue = document.getElementById("tps-value");

        function updateTPSDisplay() {
            tpsValue.textContent = targetTPS;
        }

        function updateButtonStates() {
            if (simulationPaused) {
                btnPause.classList.add("active");
                btnResume.classList.remove("active");
            } else {
                btnPause.classList.remove("active");
                btnResume.classList.add("active");
            }
        }

        btnPause.onclick = () => {
            if (!simulationPaused) {
                simulationPaused = true;
                socket.send(JSON.stringify("PauseSim"));
                updateButtonStates();
                console.log("Pause command sent");
            }
        };

        btnResume.onclick = () => {
            if (simulationPaused) {
                simulationPaused = false;
                socket.send(JSON.stringify("ResumeSim"));
                updateButtonStates();
                console.log("Resume command sent");
            }
        };

        tpsSlider.oninput = (e) => {
            const newTPS = parseInt(e.target.value);
            tpsValue.textContent = newTPS;
        };

        tpsSlider.onchange = (e) => {
            targetTPS = parseInt(e.target.value);
            socket.send(JSON.stringify({"SetTargetTPS": targetTPS}));
            console.log("Target TPS set to:", targetTPS);
        };

        // Initialize
        tpsSlider.value = targetTPS;
        updateTPSDisplay();
        updateButtonStates();

    </script>

</body>
